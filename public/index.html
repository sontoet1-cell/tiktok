<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Channel Downloader</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 24px;
    }
    input, button {
      font: inherit;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #020617;
      color: #e2e8f0;
      margin: 12px 0;
      box-sizing: border-box;
    }
    button, a.btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      border: 0;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      margin-right: 10px;
    }
    button:disabled {
      opacity: .6;
      cursor: wait;
    }
    .secondary {
      background: #38bdf8;
      color: #082f49;
    }
    .hidden {
      display: none;
    }
    .bar {
      width: 100%;
      height: 14px;
      background: #020617;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
      border: 1px solid #334155;
    }
    .fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
    }
    .stats {
      display: flex;
      gap: 18px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .muted {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tải toàn bộ video của 1 kênh TikTok</h1>
    <p class="muted">Dán link kênh dạng <code>https://www.tiktok.com/@username</code>, hệ thống sẽ tải video công khai, nén thành 1 file zip và cho tải về.</p>

    <div class="card">
      <form id="form">
        <input id="url" type="url" placeholder="https://www.tiktok.com/@username" required />
        <button id="submit" type="submit">Bắt đầu</button>
        <button id="paste" class="secondary" type="button">Dán</button>
        <a id="download" class="btn hidden" href="#">Tải file ZIP</a>
      </form>

      <p id="status">Sẵn sàng.</p>
      <div class="bar">
        <div id="fill" class="fill"></div>
      </div>

      <div class="stats">
        <div>Tổng: <strong id="total">0</strong></div>
        <div>Đã tải: <strong id="downloaded">0</strong></div>
        <div>Lỗi: <strong id="failed">0</strong></div>
        <div>Tiến trình: <strong id="progress">0%</strong></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
